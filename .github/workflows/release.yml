name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver part to bump"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Bump version and create release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # PAT with Contents: read/write, listed in the branch-protection
          # bypass allowlist so the release commit + tag can push to main.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          uv version --no-sync --bump "${{ inputs.bump }}"
          new_version="$(uv version --short)"
          [[ -n "$new_version" ]] || { echo '::error::failed to read new version'; exit 1; }
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$new_version" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, and push
        shell: bash
        env:
          TAG: ${{ steps.bump.outputs.tag }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::tag $TAG already exists"; exit 1
          fi
          git add pyproject.toml uv.lock
          git commit -m "chore(release): $VERSION"
          git tag -a "$TAG" -m "Release $VERSION"
          git push origin HEAD
          git push origin "$TAG"

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAG: ${{ steps.bump.outputs.tag }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --title "$VERSION" \
            --generate-notes
