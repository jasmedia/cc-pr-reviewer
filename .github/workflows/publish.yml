name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build sdist and wheel
        run: uv build

      - name: Validate distribution metadata
        run: uvx twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      # Name must match the PyPI project's Trusted Publisher config
      # (pypi.org -> Manage -> Publishing); renaming here without
      # updating PyPI will break OIDC.
      name: pypi
      url: https://pypi.org/p/cc-pr-reviewer
    permissions:
      # Required for PyPI Trusted Publishing OIDC token exchange.
      id-token: write
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # No repo checked out in this job, so there's no uv.lock to key
          # the cache on. Disable to silence "empty workdir" / "cache will
          # never get invalidated" warnings.
          enable-cache: false

      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/*.whl dist/*.tar.gz)
          (( ${#files[@]} > 0 )) || { echo '::error::nothing to publish'; exit 1; }
          uv publish --trusted-publishing always --check-url https://pypi.org/simple/
